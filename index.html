<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <title>Floppy Arcade</title>

    <style>
      :root {
        color-scheme: dark;
        --bg: #020617;
        --panel: rgba(15, 23, 42, 0.76);
        --line: rgba(255, 255, 255, 0.12);
        --text: #f8fafc;
        --violet: #7c3aed;
        --lime: #bef264;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        touch-action: manipulation;
      }

      body {
        display: flex;

      }

      .score-card {
        padding: 6px 12px;

    </style>
  </head>

  <body>
    <main class="shell">
      <section class="stage">
        <div class="game-wrap">
          <canvas id="game"></canvas>

          <aside class="side">
            <div class="score-card">
              <p class="score-value" id="score">0</p>
            </div>

            <button class="button" id="retry" type="button" style="display: none">
              Reintentar
            </button>
          </aside>
        </div>
      </section>
    </main>

    <script>
      (() => {
        "use strict";

        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d", { alpha: false });

        const scoreEl = document.getElementById("score");
        const retryButton = document.getElementById("retry");

        const W = 390;
        const H = 640;
        const GROUND = 592;
        const PLAYER_X = 96;
        const PLAYER_R = 17;
        const GRAVITY = 1180;
        const FLAP = -390;
        const PIPE_W = 62;

        const stars = Array.from({ length: 42 }, (_, index) => ({
          x: (index * 73) % W,
          y: 24 + ((index * 97) % 470),
          size: 1 + (index % 3) * 0.45,
          speed: 14 + (index % 5) * 8,
          color: index % 4 === 0 ? "#bef264" : index % 3 === 0 ? "#c084fc" : "#93c5fd",
        }));

        function initialState(mode = "ready") {
          return {
            mode,
            playerY: H * 0.43,
            velocity: mode === "running" ? FLAP : 0,
            obstacles: [],
            score: 0,
            lastTime: 0,
            spawnTimer: 0.72,
            backgroundOffset: 0,
          };
        }

        let game = initialState();

        function clamp(value, min, max) {
          return Math.min(Math.max(value, min), max);
        }

        function randomGapY(score) {
          const wave = Math.sin(score * 1.7) * 74;
          const base = 322 + wave + (Math.random() - 0.5) * 110;
          return clamp(base, 205, 450);
        }

        function resize() {
          const rect = canvas.getBoundingClientRect();
          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          const nextW = Math.max(1, Math.round(rect.width * dpr));
          const nextH = Math.max(1, Math.round(rect.height * dpr));

          if (canvas.width !== nextW || canvas.height !== nextH) {
            canvas.width = nextW;
            canvas.height = nextH;
          }
        }

        function roundedRect(x, y, w, h, r) {
          const radius = Math.min(r, w / 2, h / 2);

          ctx.beginPath();
          ctx.moveTo(x + radius, y);
          ctx.lineTo(x + w - radius, y);
          ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
          ctx.lineTo(x + w, y + h - radius);
          ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
          ctx.lineTo(x + radius, y + h);
          ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
          ctx.lineTo(x, y + radius);
          ctx.quadraticCurveTo(x, y, x + radius, y);
          ctx.closePath();
        }

        function drawBackground() {
          const sky = ctx.createLinearGradient(0, 0, 0, H);
          sky.addColorStop(0, "#11134a");
          sky.addColorStop(0.48, "#25125f");
          sky.addColorStop(1, "#040714");

          ctx.fillStyle = sky;
          ctx.fillRect(0, 0, W, H);

          for (const star of stars) {
            const x = (star.x - game.backgroundOffset * star.speed * 0.018 + W) % W;
            ctx.globalAlpha = 0.6 + ((star.x + star.y) % 5) * 0.08;
            ctx.fillStyle = star.color;
            ctx.fillRect(x, star.y, star.size, star.size);
          }

          ctx.globalAlpha = 1;
        }

        function drawGround() {
          const ground = ctx.createLinearGradient(0, GROUND, 0, H);
          ground.addColorStop(0, "#312e81");
          ground.addColorStop(1, "#020617");

          ctx.fillStyle = ground;
          ctx.fillRect(0, GROUND, W, H - GROUND);

          ctx.fillStyle = "#bef264";
          ctx.fillRect(0, GROUND, W, 4);
        }

        function drawObstacle(obstacle) {
          const topH = obstacle.gapY - obstacle.gap / 2;
          const bottomY = obstacle.gapY + obstacle.gap / 2;
          const bottomH = GROUND - bottomY;

          const gradient = ctx.createLinearGradient(obstacle.x, 0, obstacle.x + obstacle.width, 0);
          gradient.addColorStop(0, "#4338ca");
          gradient.addColorStop(0.52, "#7c3aed");
          gradient.addColorStop(1, "#111827");

          ctx.fillStyle = gradient;

          roundedRect(obstacle.x, -10, obstacle.width, topH + 10, 12);
          ctx.fill();

          roundedRect(obstacle.x, bottomY, obstacle.width, bottomH + 16, 12);
          ctx.fill();

          ctx.fillStyle = "#bef264";

          roundedRect(obstacle.x - 7, topH - 20, obstacle.width + 14, 22, 7);
          ctx.fill();

          roundedRect(obstacle.x - 7, bottomY, obstacle.width + 14, 22, 7);
          ctx.fill();
        }

        function drawPlayer() {
          const angle = clamp(game.velocity / 700, -0.42, 0.5);

          ctx.save();
          ctx.translate(PLAYER_X, game.playerY);
          ctx.rotate(angle);

          ctx.fillStyle = "rgba(190,242,100,0.25)";
          roundedRect(-25, -18, 50, 36, 15);
          ctx.fill();

          ctx.fillStyle = "#bef264";
          roundedRect(-17, -13, 36, 26, 7);
          ctx.fill();

          ctx.fillStyle = "#8b5cf6";
          ctx.beginPath();
          ctx.moveTo(-8, 0);
          ctx.lineTo(-30, -18);
          ctx.lineTo(-23, 8);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = "#f8fafc";
          ctx.fillRect(7, -7, 8, 8);

          ctx.fillStyle = "#020617";
          ctx.fillRect(11, -4, 4, 4);

          ctx.fillStyle = "#f97316";
          ctx.fillRect(18, -1, 12, 5);
          ctx.fillRect(25, 2, 6, 4);

          ctx.restore();
        }

        function drawOverlay() {
          if (game.mode === "running") return;

          ctx.save();
          ctx.textAlign = "center";

          ctx.fillStyle = "rgba(2,6,23,0.68)";
          roundedRect(36, 210, W - 72, 160, 24);
          ctx.fill();

          ctx.strokeStyle = "rgba(190,242,100,0.48)";
          ctx.lineWidth = 2;
          roundedRect(36, 210, W - 72, 160, 24);
          ctx.stroke();

          ctx.fillStyle = "#bef264";
          ctx.font = "900 28px sans-serif";

          ctx.fillText(
            game.mode === "gameover" ? "GAME OVER" : "FLOPPY ARCADE",
            W / 2,
            270,
          );

          ctx.fillStyle = "#ffffff";
          ctx.font = "700 15px sans-serif";
          ctx.fillText("Toca para jugar", W / 2, 315);

          ctx.restore();
        }

        function draw() {
          const sx = canvas.width / W;
          const sy = canvas.height / H;

          ctx.setTransform(1, 0, 0, 1, 0, 0);
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.setTransform(sx, 0, 0, sy, 0, 0);

          drawBackground();
          game.obstacles.forEach(drawObstacle);
          drawGround();
          drawPlayer();
          drawOverlay();
        }

        function update(delta) {
          if (game.mode === "ready") {
            game.backgroundOffset += delta;
            game.playerY = H * 0.43 + Math.sin(performance.now() * 0.005) * 10;
            return;
          }

          if (game.mode !== "running") {
            game.backgroundOffset += delta * 0.45;
            return;
          }

          const speed = 166 + Math.min(game.score * 5.2, 96);

          game.backgroundOffset += delta;
          game.velocity += GRAVITY * delta;
          game.playerY += game.velocity * delta;
          game.spawnTimer -= delta;

          if (game.spawnTimer <= 0) {
            game.obstacles.push({
              x: W + 32,
              gapY: randomGapY(game.score),
              gap: Math.max(132, 166 - game.score * 1.35),
              width: PIPE_W,
              passed: false,
            });

            game.spawnTimer = 1.34;
          }

          for (const obstacle of game.obstacles) {
            obstacle.x -= speed * delta;

            if (!obstacle.passed && obstacle.x + obstacle.width < PLAYER_X - PLAYER_R) {
              obstacle.passed = true;
              game.score += 1;
              scoreEl.textContent = String(game.score);
            }
          }

          game.obstacles = game.obstacles.filter((obstacle) => obstacle.x + obstacle.width > -40);
        }

        function hasCollision() {
          if (game.playerY - PLAYER_R < 0 || game.playerY + PLAYER_R > GROUND) {
            return true;
          }

          const left = PLAYER_X - PLAYER_R;
          const right = PLAYER_X + PLAYER_R;
          const top = game.playerY - PLAYER_R;
          const bottom = game.playerY + PLAYER_R;

          return game.obstacles.some((obstacle) => {
            const overlapsX = right > obstacle.x && left < obstacle.x + obstacle.width;
            const gapTop = obstacle.gapY - obstacle.gap / 2;
            const gapBottom = obstacle.gapY + obstacle.gap / 2;

            return overlapsX && (top < gapTop || bottom > gapBottom);
          });
        }

        function finishGame() {
          game.mode = "gameover";
          game.velocity = 0;
          retryButton.style.display = "block";
        }

        function reset(startRunning = false) {
          game = initialState(startRunning ? "running" : "ready");
          scoreEl.textContent = "0";
          retryButton.style.display = "none";
        }

        function flap() {
          if (game.mode === "gameover") {
            reset(true);
            return;
          }

          if (game.mode === "ready") {
            game.mode = "running";
          }

          game.velocity = FLAP;
        }

        function tick(time) {
          resize();

          const previous = game.lastTime || time;
          const delta = Math.min((time - previous) / 1000, 0.034);

          game.lastTime = time;

          update(delta);

          if (game.mode === "running" && hasCollision()) {
            finishGame();
          }

          draw();

          requestAnimationFrame(tick);
        }

        canvas.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          flap();
        });

        retryButton.addEventListener("click", () => reset(true));

        window.addEventListener(
          "keydown",
          (event) => {
            if (
              event.code === "Space" ||
              event.code === "ArrowUp" ||
              event.code === "KeyW"
            ) {
              event.preventDefault();
              event.stopPropagation();
              flap();
            }
          },
          { passive: false },
        );

        window.addEventListener("resize", resize);

        resize();
        requestAnimationFrame(tick);
      })();
    </script>
  </body>
</html>
